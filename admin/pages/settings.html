<h2>Site Settings</h2>

<div class="settings-container">

<!-- STORE INFORMATION -->
<div class="settings-section">
<h3>Store Information</h3>

<label for="shopName">Shop Name</label>
<input id="shopName" type="text" value="SweetOrder">

<label for="shopEmail">Shop Email</label>
<input id="shopEmail" type="email" placeholder="example@email.com">

<label for="shopPhone">Contact Number</label>
<input id="shopPhone" type="text" placeholder="+63 912 345 6789">

</div>


<!-- DELIVERY SETTINGS -->
<div class="settings-section">
<h3>Delivery Settings</h3>

<label for="deliveryFee">Delivery Fee ($)</label>
<input id="deliveryFee" type="number" value="5">

</div>


<!-- STORE APPEARANCE -->
<div class="settings-section">
<h3>Branding</h3>

<label for="logoUpload">Upload Store Logo</label>
<input id="logoUpload" type="file">

</div>


<!-- SAVE BUTTON -->
<div class="settings-actions">

<button class="save-btn">
Save Settings
</button>

</div>

</div>

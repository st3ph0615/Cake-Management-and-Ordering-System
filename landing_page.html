<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetOrder</title>
    <link rel="stylesheet" href="./landing_page.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img class="logo-img" src="./assets/logos.png" alt="sweetorder logo">
            </div>

            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Cakes</a>
                <a href="#">Testimonials</a>
                <a href="#">Contacts</a>
            </nav>

            <div class="nav-right">
                <img class="cart-icon" src="./assets/cart.png" alt="cart icon">
                <button class="login-button">Log In</button>
            </div>

        </div>
    </header>

    <section class="hero">
        <div class="container hero-container">
            <div class="hero-text">
                <h1>Freshly Baked Cakes</h1>
                <h2>Made With Love</h2>

                <p>
                    Order delicious cakes for birthdays,
                    weddings, and special occasions.
                </p>

                <div class="hero-buttons">
                    <button class="order-btn">Order Now</button>
                    <button class="view-btn">View Cakes</button>
                </div>
            
                
            </div>

            <div class="hero-image">
                <img src="./assets/cake.png" alt="Cake">
            </div>
        </div>
    </section>
</body>
</html>

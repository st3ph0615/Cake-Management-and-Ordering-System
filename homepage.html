<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetOrder</title>
    <link rel="stylesheet" href="homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img class="logo-img" src="./assets/logos.png" alt="sweetorder logo">
            </div>

            <!-- NAVIGATION LINKS -->
            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Cakes</a>
                <a href="#">Testimonials</a>
                <a href="#">Contacts</a>
            </nav>

            <!-- CART ICON -->
            <div class="nav-right">
                <a href="./cart.html"><img class="cart-icon" src="./assets/cart.png" alt="cart icon"></a>
            </div>

        </div>
    </header>

    <section class="shop-controls">

    <div class="controls-container">

        <!-- SEARCH BAR -->
        <input 
            type="text" 
            placeholder="Search cakes..."
            class="search-bar"
        >

        <!-- PRODUCT CATEGORY -->
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter" class="category-filter">
            <option value="">All Cakes</option>
            <option value="birthday">Birthday Cakes</option>
            <option value="wedding">Wedding Cakes</option>
            <option value="cupcake">Cupcakes</option>
            <option value="custom">Custom Cakes</option>
        </select>

    </div>
</section>

<!--PRODUCTS GRID-->
<section class="products">

    <h2>Our Cakes</h2>
    <div class="product-grid">
        <div class="product-card" data-category="wedding">
            <img class="product-img" src="./assets/3layer_weddingcake.jpg" alt="">
            <h3 class="product-name">Strawberry Dream Cake</h3>
            <p class="product-info">A delicious strawberry cake perfect for any celebration.</p>
            <p class="product-price">$18.00</p>
            <button class="add-cart" type="button">Add to Cart</button>
        </div>

        <div class="product-card" data-category="birthday">
            <img class="product-img" src="./assets/3layer_weddingcake.jpg" alt="">
            <h3 class="product-name">Chocolate Delight</h3>
            <p class="product-price">$20.00</p>
            <button class="add-cart" type="button">Add to Cart</button>
        </div>
        
        <div class="product-card" data-category="anniversary">
            <img class="product-img" src="./assets/3layer_weddingcake.jpg" alt="">
            <h3 class="product-name">Wedding Vanilla Cake</h3>
            <p class="product-price">$45.00</p>
            <button class="add-cart" type="button">Add to Cart</button>
        </div>
        
        <div class="product-card">
            <img class="product-img" src="./assets/3layer_weddingcake.jpg" alt="">
            <h3 class="product-name">Chocolate Delight</h3>
            <p class="product-price">$20.00</p>
            <button class="add-cart" type="button">Add to Cart</button>
        </div>
        
        <div class="product-card">
            <img class="product-img" src="./assets/3layer_weddingcake.jpg" alt="">
            <h3 class="product-name">Wedding Vanilla Cake</h3>
            <p class="product-price">$45.00</p>
            <button class="add-cart" type="button">Add to Cart</button>
        </div>
    </div>
</div>

<!--CART OVERLAY (MODAL)-->
</section>
<div id="cartOverlay" class="cart-overlay">
    <div class="cart-modal">
        <h2>Item Added to Cart</h2>
        <div class="cart-item">
            <img src="assets/3layer_weddingcake.jpg" id="cartImage" alt="">
            <div class="cart-info">
            <h3 id="cartName">Cake Name</h3>
            <p id="cartPrice">$35.00</p>
        </div>
    </div>
    
    <div class="cart-actions">
        <button class="continue-btn">Continue Shopping</button>
        <button class="checkout-btn" onclick="window.location.href='cart.html'">
            Go To Cart
        </button>
    </div>
</div>
</div>

<script src="cart.js"></script>
<script src="homepage.js"></script>

</body>
</html>
